---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-suite-api
  namespace: devops-suite
  labels:
    app: devops-suite-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-suite-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devops-suite-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: devops-suite
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/your-org/devops-suite:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: devops-suite-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: devops-suite-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: devops-suite-secrets
                  key: secret-key
            - name: ENVIRONMENT
              value: "production"
            - name: DEBUG
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: devops-suite-api
  namespace: devops-suite
  labels:
    app: devops-suite-api
spec:
  type: ClusterIP
  selector:
    app: devops-suite-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-suite
  namespace: devops-suite
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - devops.yourdomain.com
      secretName: devops-suite-tls
  rules:
    - host: devops.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: devops-suite-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-suite-ui
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-suite-api
  namespace: devops-suite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-suite-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: devops-suite
  labels:
    name: devops-suite
